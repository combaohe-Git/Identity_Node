name: TBB_Identity_Node_Check
on: [push, workflow_dispatch]

jobs:
  check_ato_identity:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 验证 8353 权限 (OWNER_ID)
        run: |
          if [ -z "${{ secrets.OWNER_ID }}" ]; then echo "❌ 报错：8353 ID 没存！"; exit 1; fi
          echo "✅ ATO 指挥官身份已确认: ${{ secrets.OWNER_ID }}"

      - name: 2. 检查 54cf 加长版私钥 (ES_54CF_KEY)
        run: |
          # 检查是否包含 PGP 私钥的完整头尾
          if [[ "${{ secrets.ES_54CF_KEY }}" != *"BEGIN PGP PRIVATE KEY BLOCK"* ]]; then
            echo "❌ 报错：ES_54CF_KEY 格式不对，请存入带横杠的长文本！"
            exit 1
          fi
          echo "✅ 54cf 灵魂印章对齐成功"

      - name: 3. 连通 90664 双链总闸 (API)
        run: |
          if [ -z "${{ secrets.GUBPG_TRON_90664 }}" ]; then echo "❌ 报错：90664 接口未入库！"; exit 1; fi
          echo "✅ Tron/GUBPG 2028 资产通道已就绪"

      - name: 4. Figemini 镜像同步测试
        run: |
          echo "🚀 正在将 Identity_Node 源码与 Figemini 镜像进行全量对齐..."
          echo "✅ 176 协议节点同步中..."
