name: 176TBB-IA-Automator

on:
  schedule:
    - cron: '0 * * * *'  # 每小时运行一次
  workflow_dispatch:      # 允许手动点运行按钮测试

jobs:
  run-ia-task:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: 安装依赖
        run: pip install tronpy web3
      - name: 执行监控
        env:
          PRIVATE_KEY: ${{ secrets.MY_PRIVATE_KEY }}
        run: python scripts/monitor.py

